<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Fantasy Chess v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>⚔ Final Fantasy Chess ⚔</h1>
  <p class="subtitle">PLAYER 1 vs PLAYER 2</p>

  <div class="theme-bar">
    <button class="theme-btn active" id="btnFF" onclick="setTheme('ff')">⚔️ FF7 vs FF8</button>
    <button class="theme-btn" id="btnMonster" onclick="setTheme('monster')">🐉 Monster Theme</button>
  </div>

  <div id="statusBar" class="status-bar">Giliran Player 1 (Putih)</div>

  <div class="nature-frame">
    <div class="trees-top"    id="treesTop"></div>
    <div class="trees-bottom" id="treesBottom"></div>
    <div class="trees-left"   id="treesLeft"></div>
    <div class="trees-right"  id="treesRight"></div>
    <div class="board-wrap">
      <div id="board"></div>
      <div class="coords-file" id="coordsFile"></div>
      <div class="coords-rank" id="coordsRank"></div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="newGame()">🔄 New Game</button>
    <button class="ctrl-btn" onclick="undoMove()">↩ Undo</button>
  </div>
  <div class="captured-bar" id="capturedBar"></div>
  <div class="move-log" id="moveLog"></div>
  <div class="legend" id="legend"></div>

  <div class="gameover-overlay" id="gameoverOverlay">
    <div class="gameover-box">
      <div class="gameover-title" id="gameoverTitle">♚ CHECKMATE</div>
      <div class="gameover-sub" id="gameoverSub">Player menang!</div>
      <button class="gameover-btn" onclick="newGame()">⚔ Play Again ⚔</button>
    </div>
  </div>

  <div class="modal-overlay" id="promoModal">
    <div class="modal">
      <h2>✨ Promote Pawn ✨</h2>
      <div class="promo-pieces" id="promoPieces"></div>
    </div>
  </div>

  <script src="js/pieces.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
